# =============================================================================
# design-converge.yaml  —  the OUTER governed loop (greedy, width=1, tier B)
# =============================================================================
# Controller state machine (HARNESS_DESIGN.md §2) realised as a STAGED recipe:
#   INIT     render baseline -> lints -> critic -> ledger(pass 0) -> best_so_far
#   LOOP     while not {DONE|ESCALATE}:
#              run design-pass.yaml          (planner->maker->lints->critic->evaluate->ledger)
#              design_controller op=gate     (DETERMINISTIC stopping rules)
#              update_context on gate.action (ROLLBACK/PLAN both -> edit-from-best next pass)
#   FINALIZE render_report on best_so_far -> {report_path, best_scores, passes, escalation?}
#
# DETERMINISM: stopping is decided ONLY by `design_controller op=gate` (a tool,
# invoked from a bash step — ZERO model tokens). Its four rules (bar_met /
# budget_exhausted / floor_breach / plateau) + regression handling are the core.
# No LLM ever decides to stop.
#
# GREEDY width=1: best-so-far is a LEDGER QUERY (`design_ledger op=best`), never a
# mutated variable. Each pass edits from the current best HTML, so a rejected
# candidate "rolls back" for free (the next pass simply re-edits best). The gate's
# ROLLBACK vs PLAN distinction only drives regression_retry -> regression_stuck
# escalation, tracked via prev_action / target_retried.
#
# HUMAN GATE (HARNESS_DESIGN.md §6/§7): the ONE staged approval gate is UP FRONT —
# the human authors/ratifies the APS (bar, floors, budget, epsilon, k) once, before
# any budget is spent. Normal convergence never pages the human again; an ESCALATE
# halts the loop and surfaces `escalation` in the returned summary (the "page").
# A *conditional* gate that fires ONLY on ESCALATE is NOT expressible in the recipe
# schema (stage approval gates are structural + unconditional) — see the report.
# =============================================================================
#
# CHANGELOG
# ---------
# v0.1.0 (2026-06-29):
#   - NEW: staged governed loop. Up-front APS approval gate; deterministic
#     gate-driven stopping; greedy edit-from-best; honest escalation surfacing.
# =============================================================================

name: "design-converge"
description: "Governed single-candidate design loop: human authors APS up front (approval gate), then a deterministic controller drives passes to a bar; escalation halts and is returned."
version: "0.1.0"
author: "design-loop harness"
tags: ["design-loop", "governed-loop", "tier-b", "staged"]

context:
  # --- the artifact + identity ---
  source_path: ""            # ABSOLUTE path to the baseline HTML to improve (REQUIRED)
  task_class: "landing_page" # ledger partition key
  signature: "unsigned"      # join key
  run_id: "r-local"          # this run's id
  rubric_version: "unknown"  # = design-critic bundle SHA

  # --- the APS (Acceptance/Production Spec): authored ONCE by the human ---
  bar: 24                    # target TOTAL across the 8 dims (DONE when total >= bar AND floors met)
  floors: 2                  # per-dim minimum (INT = uniform; a per-dim dict is NOT cleanly templatable — see report)
  budget: 12                 # max passes (gate returns DONE/budget_exhausted at 0)
  epsilon: 1                 # plateau threshold: worst-dim improvement < epsilon counts as flat
  k: 3                       # plateau window: ESCALATE if the last k passes were all flat
  tau: 0                     # MACA regression tolerance

  # --- plumbing (use ABSOLUTE paths; no ~ — recipe templating does not expanduser) ---
  work_dir: "/tmp/design-loop/r-local"  # run scratch + outputs
  bundle_ref: ""             # nested `amplifier tool invoke --bundle` (empty = auto-detect)

  # --- loop state (initialised here; mutated by the loop's update_context) ---
  loop_action: "PLAN"        # gate action; while/break read this
  prev_action: "NONE"        # previous gate action (drives regression_retry -> regression_stuck)

stages:
  # ===========================================================================
  # STAGE 1 — AUTHORIZE APS (the up-front human gate)
  # ===========================================================================
  - name: authorize-aps
    steps:
      - id: state-aps
        type: bash
        command: |
          set -uo pipefail
          WD="{{work_dir}}"; mkdir -p "$WD"
          echo '{"authorized":"pending","bar":"{{bar}}","budget":"{{budget}}"}'
        output: aps
        parse_json: true
    approval:
      required: true
      prompt: |
        AUTHORIZE THE ACCEPTANCE/PRODUCTION SPEC (APS) before any budget is spent.

        This is the only scheduled human checkpoint. After you approve, the loop runs
        autonomously and will page you again ONLY if it escalates (floor breach,
        plateau, or a stuck regression).

          task_class : {{task_class}}
          bar        : {{bar}}     (DONE when total across 8 dims >= bar AND every dim >= floor)
          floors     : {{floors}}  (per-dim minimum; INT = uniform)
          budget     : {{budget}}  (max passes)
          epsilon    : {{epsilon}} (plateau improvement threshold)
          k          : {{k}}       (plateau window)
          tau        : {{tau}}     (regression tolerance)

        Approve to spend up to {{budget}} passes converging toward this bar. Deny to abort.
      timeout: 0
      default: "deny"

  # ===========================================================================
  # STAGE 2 — CONVERGE (init -> deterministic loop -> finalize). No human gate.
  # ===========================================================================
  - name: converge
    steps:
      # ----- INIT: materialise helper + baseline render + lints (pass 0) -----
      - id: init-observe
        type: bash
        command: |
          set -uo pipefail
          WD="{{work_dir}}"; SRC="{{source_path}}"; B='{{bundle_ref}}'
          mkdir -p "$WD/pass0"
          echo '' | base64 -d > "$WD/dlx.py"
          cp "$SRC" "$WD/best.html"
          echo "0" > "$WD/passes.txt"
          amplifier tool invoke render source="$WD/best.html" kind=html out_path="$WD/pass0/shot.png" --output json ${B:+--bundle "$B"} > "$WD/pass0/_r.txt" 2>/dev/null || true
          amplifier tool invoke design_lints html_path="$WD/best.html" --output json ${B:+--bundle "$B"} > "$WD/pass0/_l.txt" 2>/dev/null || true
          python3 "$WD/dlx.py" extract "$WD/pass0/_l.txt" > "$WD/pass0/lints.json"
          echo '{"ready":"true"}'
        output: init_observe
        parse_json: true

      # ----- INIT: blind critic scores the BASELINE (real scores, pass 0) -----
      - id: init-critic
        type: agent
        agent: "design-loop:design-critic"
        prompt: |
          You are the CRITIC — a blind judge scoring the BASELINE design (pass 0).
          You have not seen any source code or intent. Judge only what is on screen.

          View ONLY the screenshot: {{work_dir}}/pass0/shot.png
          Objective lint anchors: {{work_dir}}/pass0/lints.json

          Score these 8 qualities as integers 0-4 against your frozen rubric:
            clarity, elegance, restraint, empowerment, agency, ease, character, point
          Write the JSON object to {{work_dir}}/best_scores.json and return it.
        output: baseline_scores
        parse_json: true

      # ----- INIT: seed the ledger with pass 0 as the first ACCEPTED best -----
      - id: init-ledger
        type: bash
        command: |
          set -uo pipefail
          WD="{{work_dir}}"; B='{{bundle_ref}}'
          python3 "$WD/dlx.py" baserec "$WD" "{{run_id}}" "{{task_class}}" "{{signature}}" "{{rubric_version}}" > "$WD/pass0/record.json"
          amplifier tool invoke design_ledger op=append record="$(cat "$WD/pass0/record.json")" --output json ${B:+--bundle "$B"} > "$WD/pass0/_a.txt" 2>/dev/null || true
          echo '{"seeded":"true"}'
        output: init_ledger
        parse_json: true

      # ----- LOOP: design-pass sub-recipe + deterministic gate, per iteration -----
      - id: converge-loop
        type: bash
        command: "true"   # no-op container; the real work is in while_steps
        while_condition: "{{loop_action}} != 'DONE' and {{loop_action}} != 'ESCALATE'"
        max_while_iterations: 64   # hard safety cap; the REAL budget is enforced by the gate (budget_remaining -> DONE)
        while_steps:
          # (a) one governed pass — edits from the current best HTML
          - id: run-pass
            type: recipe
            recipe: "./design-pass.yaml"
            context:
              run_id: "{{run_id}}"
              task_class: "{{task_class}}"
              signature: "{{signature}}"
              rubric_version: "{{rubric_version}}"
              working_head_path: "{{work_dir}}/best.html"
              best_scores_path: "{{work_dir}}/best_scores.json"
              pass_dir: "{{work_dir}}/pass-live"
              bundle_ref: "{{bundle_ref}}"
              tau: "{{tau}}"
            output: pass_out
            parse_json: true

          # (b) deterministic GATE — the ONLY place a stop is decided
          - id: gate
            type: bash
            command: |
              set -uo pipefail
              WD="{{work_dir}}"; B='{{bundle_ref}}'
              N=$(cat "$WD/passes.txt" 2>/dev/null || echo 0); N=$((N+1)); echo "$N" > "$WD/passes.txt"
              BR=$(( {{budget}} - N )); [ "$BR" -lt 0 ] && BR=0
              amplifier tool invoke design_ledger op=best task_class="{{task_class}}" --output json ${B:+--bundle "$B"} > "$WD/_best.txt" 2>/dev/null || true
              python3 "$WD/dlx.py" extract "$WD/_best.txt" > "$WD/best_record.json"
              amplifier tool invoke design_ledger op=query task_class="{{task_class}}" --output json ${B:+--bundle "$B"} > "$WD/_all.txt" 2>/dev/null || true
              python3 "$WD/dlx.py" extract "$WD/_all.txt" > "$WD/all_records.json"
              python3 "$WD/dlx.py" gateprep "$WD" "{{prev_action}}" > "$WD/gateprep.json"
              TR=$(python3 "$WD/dlx.py" get "$WD/gateprep.json" target_retried false)
              DEC=$(python3 "$WD/dlx.py" get "$WD/gateprep.json" last_decision NO_GAIN)
              BS="$(cat "$WD/best_scores.json" 2>/dev/null)"; [ -z "$BS" ] && BS=null
              amplifier tool invoke design_controller op=gate best_scores="$BS" bar="{{bar}}" floors="{{floors}}" budget_remaining="$BR" recent_improvements="$(cat "$WD/improvements.json")" k="{{k}}" epsilon="{{epsilon}}" last_decision="$DEC" target_retried="$TR" --output json ${B:+--bundle "$B"} > "$WD/_g.txt" 2>/dev/null || true
              python3 "$WD/dlx.py" extract "$WD/_g.txt" > "$WD/gate.json"
              python3 "$WD/dlx.py" gateout "$WD" "$BR"
            output: gate_out
            parse_json: true
        update_context:
          loop_action: "{{gate_out.action}}"
          prev_action: "{{gate_out.action}}"
        break_when: "{{loop_action}} == 'DONE' or {{loop_action}} == 'ESCALATE'"

      # ----- FINALIZE: report on the best artifact ever seen + escalation verdict -----
      - id: finalize
        type: bash
        command: |
          set -uo pipefail
          WD="{{work_dir}}"; B='{{bundle_ref}}'
          amplifier tool invoke design_ledger op=best task_class="{{task_class}}" --output json ${B:+--bundle "$B"} > "$WD/_best.txt" 2>/dev/null || true
          python3 "$WD/dlx.py" extract "$WD/_best.txt" > "$WD/best_record.json"
          python3 "$WD/dlx.py" verdict "$WD" > "$WD/verdict.json"
          amplifier tool invoke render_report verdict="$(cat "$WD/verdict.json")" target_html_path="$WD/best.html" out_path="$WD/report.html" --output json ${B:+--bundle "$B"} > "$WD/_rep.txt" 2>/dev/null || true
          python3 "$WD/dlx.py" extract "$WD/_rep.txt" > "$WD/report.json"
          python3 "$WD/dlx.py" summary "$WD" "{{loop_action}}"
        output: final_output
        parse_json: true
