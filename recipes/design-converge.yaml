# =============================================================================
# design-converge.yaml  —  the OUTER governed loop (greedy, width=1, tier B)
# =============================================================================
# Controller state machine (HARNESS_DESIGN.md §2) realised as a STAGED recipe:
#   INIT     render baseline -> lints -> critic -> ledger(pass 0) -> best_so_far
#   LOOP     while not {DONE|ESCALATE}:
#              run design-pass.yaml          (planner->maker->lints->critic->evaluate->ledger)
#              design_controller op=gate     (DETERMINISTIC stopping rules)
#              update_context on gate.action (ROLLBACK/PLAN both -> edit-from-best next pass)
#   FINALIZE render_report on best_so_far -> {report_path, best_scores, passes, escalation?}
#
# DETERMINISM: stopping is decided ONLY by `design_controller op=gate` (a tool,
# invoked from a bash step — ZERO model tokens). Its four rules (bar_met /
# budget_exhausted / floor_breach / plateau) + regression handling are the core.
# No LLM ever decides to stop.
#
# GREEDY width=1: best-so-far is a LEDGER QUERY (`design_ledger op=best`), never a
# mutated variable. Each pass edits from the current best HTML, so a rejected
# candidate "rolls back" for free (the next pass simply re-edits best). The gate's
# ROLLBACK vs PLAN distinction only drives regression_retry -> regression_stuck
# escalation, tracked via prev_action / target_retried.
#
# FIREWALL (HARNESS_DESIGN.md §4 — judge ≠ maker): the critic (init-critic below)
# and the planner+maker (inside design-pass.yaml) are spawned as SEPARATE
# agent-bundles. The isolation is enforced in THOSE manifests, not here — each is
# spawned with context_depth="none" + tool least-privilege (exclude_tools), so the
# critic holds no write tool and the maker never receives the rubric or the scores.
# This recipe only wires them; see the design-critic / design-planner / design-maker
# bundle manifests for the enforced no-leak contract.
#
# HUMAN GATE (HARNESS_DESIGN.md §6/§7): the ONE staged approval gate is UP FRONT —
# the human authors/ratifies the APS (bar, floors, budget, epsilon, k) once, before
# any budget is spent. Normal convergence never pages the human again; an ESCALATE
# halts the loop and surfaces `escalation` in the returned summary (the "page").
# A *conditional* gate that fires ONLY on ESCALATE is NOT expressible in the recipe
# schema (stage approval gates are structural + unconditional) — see the report.
# RESOLVING an escalation is therefore an out-of-band, human action: re-invoke this
# recipe with an adjusted APS (raise/lower bar, +budget, relax floors, widen
# epsilon/k). Because the ledger is cross-run, the next run resumes from the
# best-so-far rather than starting over.
# =============================================================================
#
# CHANGELOG
# ---------
# v0.1.0 (2026-06-29):
#   - NEW: staged governed loop. Up-front APS approval gate; deterministic
#     gate-driven stopping; greedy edit-from-best; honest escalation surfacing.
# =============================================================================

name: "design-converge"
description: "Governed single-candidate design loop: human authors APS up front (approval gate), then a deterministic controller drives passes to a bar; escalation halts and is returned."
version: "0.1.0"
author: "design-loop harness"
tags: ["design-loop", "governed-loop", "tier-b", "staged"]

context:
  # --- the artifact + identity ---
  source: ""                 # Input to improve: HTML path, URL, image path, or prompt text (REQUIRED)
  source_path: ""            # DEPRECATED alias kept for backward compat; overridden by source when set
  brief: ""                  # OPTIONAL free-text design intent from the app UI (e.g. "make a version for veterinary scientists"); secondary to the fix-batch directives -- the maker is intentionally rubric-blind
  task_class: "landing_page" # ledger partition key
  signature: "unsigned"      # join key
  run_id: "r-local"          # this run's id
  rubric_version: "unknown"  # = design-critic bundle SHA

  # --- the APS (Acceptance/Production Spec): authored ONCE by the human ---
  bar: 24                    # target TOTAL across the 8 dims (DONE when total >= bar AND floors met)
  floors: 2                  # per-dim minimum (INT = uniform; a per-dim dict is NOT cleanly templatable — see report)
  budget: 12                 # max passes (gate returns DONE/budget_exhausted at 0)
  epsilon: 1                 # plateau threshold: worst-dim improvement < epsilon counts as flat
  k: 3                       # plateau window: ESCALATE if the last k passes were all flat
  tau: 0                     # MACA regression tolerance

  # --- output selector ---
  output: "all"              # What to emit: html (upgraded.html), report (report.html), prompt (design-spec.txt), all (default)

  # --- plumbing (use ABSOLUTE paths; no ~ — recipe templating does not expanduser) ---
  work_dir: "/tmp/design-loop/r-local"  # run scratch + outputs
  bundle_ref: ""             # nested `inv amplifier tool invoke --bundle` (empty = auto-detect)

  # --- loop state (initialised here; mutated by the loop's update_context) ---
  loop_action: "PLAN"        # gate action; while/break read this
  prev_action: "NONE"        # previous gate action (drives regression_retry -> regression_stuck)
  prior_lint_reasons: ""     # deterministic lint failure reasons from previous pass (rubric-free)
  INVOKE_TIMEOUT: 120      # per-tool-invoke hard timeout in seconds (anti-hang)

stages:
  # ===========================================================================
  # STAGE 1 — AUTHORIZE APS (the up-front human gate)
  # ===========================================================================
  - name: authorize-aps
    steps:
      - id: state-aps
        type: bash
        command: |
          set -uo pipefail
          _to(){ if command -v timeout >/dev/null 2>&1; then timeout "$@"; elif command -v gtimeout >/dev/null 2>&1; then gtimeout "$@"; else shift; "$@"; fi; }
          inv(){ local t=${INVOKE_TIMEOUT:-120}; local n=0; while [ $n -lt 2 ]; do _to "$t" "$@" && return 0; n=$((n+1)); echo "invoke retry $n after timeout/err" >&2; done; _to "$t" "$@"; }
          WD="{{work_dir}}"; mkdir -p "$WD"
          echo '{"authorized":"pending","bar":"{{bar}}","budget":"{{budget}}"}'
        output: aps
        parse_json: true
    approval:
      required: true
      prompt: |
        AUTHORIZE THE ACCEPTANCE/PRODUCTION SPEC (APS) before any budget is spent.

        This is the only scheduled human checkpoint. After you approve, the loop runs
        autonomously and will page you again ONLY if it escalates (floor breach,
        plateau, or a stuck regression).

          task_class : {{task_class}}
          bar        : {{bar}}     (DONE when total across 8 dims >= bar AND every dim >= floor)
          floors     : {{floors}}  (per-dim minimum; INT = uniform)
          budget     : {{budget}}  (max passes)
          epsilon    : {{epsilon}} (plateau improvement threshold)
          k          : {{k}}       (plateau window)
          tau        : {{tau}}     (regression tolerance)

        Approve to spend up to {{budget}} passes converging toward this bar. Deny to abort.
      timeout: 0
      default: "deny"

  # ===========================================================================
  # STAGE 2 — CONVERGE (init -> deterministic loop -> finalize). No human gate.
  # ===========================================================================
  - name: converge
    steps:
      # ----- INIT: materialise helper + baseline render + lints (pass 0) -----
      - id: init-observe
        type: bash
        command: |
          set -uo pipefail
          _to(){ if command -v timeout >/dev/null 2>&1; then timeout "$@"; elif command -v gtimeout >/dev/null 2>&1; then gtimeout "$@"; else shift; "$@"; fi; }
          inv(){ local t=${INVOKE_TIMEOUT:-120}; local n=0; while [ $n -lt 2 ]; do _to "$t" "$@" && return 0; n=$((n+1)); echo "invoke retry $n after timeout/err" >&2; done; _to "$t" "$@"; }
          WD="{{work_dir}}"; B='{{bundle_ref}}'
          # -- Input normalization: determine kind and set up baseline --
          # source var takes precedence over legacy source_path
          SRC="{{source}}"; [ -z "$SRC" ] && SRC="{{source_path}}"
          mkdir -p "$WD/pass0"
          # Classify the source (pure shell, mirrors dlx.classify_input rules)
          KIND=""
          case "$SRC" in
            http://*|https://*) KIND="url" ;;
            *.html|*.HTML|*.htm|*.HTM) KIND="html" ;;
            *.png|*.PNG|*.jpg|*.JPG|*.jpeg|*.JPEG|*.webp|*.WEBP|*.gif|*.GIF) KIND="image" ;;
            *) KIND="prompt" ;;
          esac
          echo "$KIND" > "$WD/input_kind.txt"
          echo '' | base64 -d > "$WD/dlx.py"
          # Set up baseline per kind
          if [ "$KIND" = "html" ]; then
            cp "$SRC" "$WD/best.html"
          elif [ "$KIND" = "url" ]; then
            # BEST-EFFORT: render URL to a baseline screenshot; create stub best.html
            # TODO (full impl): feed baseline_image to design-pass maker
            inv amplifier tool invoke render source="$SRC" kind=url out_path="$WD/pass0/shot.png" --output json ${B:+--bundle "$B"} 2>/dev/null || true
            printf '<!DOCTYPE html><html><body><!-- url-baseline: %s --></body></html>\n' "$SRC" > "$WD/best.html"
          elif [ "$KIND" = "image" ]; then
            # BEST-EFFORT: use given image as baseline screenshot; create stub best.html
            # TODO (full impl): feed baseline_image to design-pass maker
            cp "$SRC" "$WD/pass0/shot.png" 2>/dev/null || cp "$SRC" "$WD/pass0/shot.png" || true
            printf '<!DOCTYPE html><html><body><!-- image-baseline: %s --></body></html>\n' "$SRC" > "$WD/best.html"
          else
            # prompt: no source file; create empty baseline HTML with brief as comment
            printf '<!DOCTYPE html><html><body><!-- brief: %s --></body></html>\n' "$SRC" > "$WD/best.html"
            printf '%s\n' "$SRC" > "$WD/source_brief.txt"
          fi
          echo "0" > "$WD/passes.txt"
          # Render pass0 screenshot (html: render from file; url/image: already set above; prompt: render empty stub)
          [ "$KIND" = "html" ] || [ "$KIND" = "prompt" ] && inv amplifier tool invoke render source="$WD/best.html" kind=html out_path="$WD/pass0/shot.png" --output json ${B:+--bundle "$B"} > "$WD/pass0/_r.txt" 2>/dev/null || true
          inv amplifier tool invoke design_lints html_path="$WD/best.html" --output json ${B:+--bundle "$B"} > "$WD/pass0/_l.txt" 2>/dev/null || true
          python3 "$WD/dlx.py" extract "$WD/pass0/_l.txt" > "$WD/pass0/lints.json"
          echo '{"ready":"true"}'
        output: init_observe
        parse_json: true

      # ----- INIT: blind critic scores the BASELINE (real scores, pass 0) -----
      # FIREWALL (HARNESS_DESIGN.md §4): this is the JUDGE, a separate agent-bundle
      # from the maker in design-pass.yaml. It is given ONLY the screenshot + lint
      # facts — never the source HTML. Its write-isolation (no edit tool) and the
      # maker's rubric-blindness are enforced in the bundle manifests, not here.
      - id: init-critic
        type: agent
        agent: "design-loop:design-critic"
        prompt: |
          You are the CRITIC — a blind judge scoring the BASELINE design (pass 0).
          You have not seen any source code or intent. Judge only what is on screen.

          View ONLY the screenshot: {{work_dir}}/pass0/shot.png
          Objective lint anchors: {{work_dir}}/pass0/lints.json

          Score these 8 qualities as integers 0-4 against your frozen rubric:
            clarity, elegance, restraint, empowerment, agency, ease, character, point
          Write the JSON object to {{work_dir}}/best_scores.json and return it.
        output: baseline_scores
        parse_json: true

      # ----- INIT: seed the ledger with pass 0 as the first ACCEPTED best -----
      - id: init-ledger
        type: bash
        command: |
          set -uo pipefail
          _to(){ if command -v timeout >/dev/null 2>&1; then timeout "$@"; elif command -v gtimeout >/dev/null 2>&1; then gtimeout "$@"; else shift; "$@"; fi; }
          inv(){ local t=${INVOKE_TIMEOUT:-120}; local n=0; while [ $n -lt 2 ]; do _to "$t" "$@" && return 0; n=$((n+1)); echo "invoke retry $n after timeout/err" >&2; done; _to "$t" "$@"; }
          WD="{{work_dir}}"; B='{{bundle_ref}}'
          python3 "$WD/dlx.py" normscores "$WD/best_scores.json" >/dev/null 2>&1 || true
          python3 "$WD/dlx.py" baserec "$WD" "{{run_id}}" "{{task_class}}" "{{signature}}" "{{rubric_version}}" > "$WD/pass0/record.json"
          inv amplifier tool invoke design_ledger op=append record="$(cat "$WD/pass0/record.json")" --output json ${B:+--bundle "$B"} > "$WD/pass0/_a.txt" 2>/dev/null || true
          echo '{"seeded":"true"}'
        output: init_ledger
        parse_json: true

      # ----- LOOP: design-pass sub-recipe + deterministic gate, per iteration -----
      - id: converge-loop
        type: bash
        command: "true"   # no-op container; the real work is in while_steps
        while_condition: "{{loop_action}} != 'DONE' and {{loop_action}} != 'ESCALATE'"
        max_while_iterations: 64   # hard safety cap; the REAL budget is enforced by the gate (budget_remaining -> DONE)
        while_steps:
          # (a) one governed pass — edits from the current best HTML
          - id: run-pass
            type: recipe
            recipe: "./design-pass.yaml"
            context:
              run_id: "{{run_id}}"
              task_class: "{{task_class}}"
              signature: "{{signature}}"
              rubric_version: "{{rubric_version}}"
              working_head_path: "{{work_dir}}/best.html"
              best_scores_path: "{{work_dir}}/best_scores.json"
              pass_dir: "{{work_dir}}/pass-live"
              bundle_ref: "{{bundle_ref}}"
              tau: "{{tau}}"
              prior_lint_reasons: "{{prior_lint_reasons}}"
              brief: "{{brief}}"
            output: pass_out
            parse_json: true

          # (b) deterministic GATE — the ONLY place a stop is decided
          - id: gate
            type: bash
            command: |
              set -uo pipefail
              _to(){ if command -v timeout >/dev/null 2>&1; then timeout "$@"; elif command -v gtimeout >/dev/null 2>&1; then gtimeout "$@"; else shift; "$@"; fi; }
              inv(){ local t=${INVOKE_TIMEOUT:-120}; local n=0; while [ $n -lt 2 ]; do _to "$t" "$@" && return 0; n=$((n+1)); echo "invoke retry $n after timeout/err" >&2; done; _to "$t" "$@"; }
              WD="{{work_dir}}"; B='{{bundle_ref}}'
              N=$(cat "$WD/passes.txt" 2>/dev/null || echo 0); N=$((N+1)); echo "$N" > "$WD/passes.txt"
              BR=$(( {{budget}} - N )); [ "$BR" -lt 0 ] && BR=0
              inv amplifier tool invoke design_ledger op=best task_class="{{task_class}}" --output json ${B:+--bundle "$B"} > "$WD/_best.txt" 2>/dev/null || true
              python3 "$WD/dlx.py" extract "$WD/_best.txt" > "$WD/best_record.json"
              inv amplifier tool invoke design_ledger op=query task_class="{{task_class}}" --output json ${B:+--bundle "$B"} > "$WD/_all.txt" 2>/dev/null || true
              python3 "$WD/dlx.py" extract "$WD/_all.txt" > "$WD/all_records.json"
              python3 "$WD/dlx.py" gateprep "$WD" "{{prev_action}}" > "$WD/gateprep.json"
              TR=$(python3 "$WD/dlx.py" get "$WD/gateprep.json" target_retried false)
              DEC=$(python3 "$WD/dlx.py" get "$WD/gateprep.json" last_decision NO_GAIN)
              CIB=$(python3 "$WD/dlx.py" get "$WD/gateprep.json" champion_is_baseline false)
              python3 "$WD/dlx.py" normscores "$WD/best_scores.json" >/dev/null 2>&1 || true
              BS="$(cat "$WD/best_scores.json" 2>/dev/null)"; [ -z "$BS" ] && BS=null
              inv amplifier tool invoke design_controller op=gate best_scores="$BS" bar="{{bar}}" floors="{{floors}}" budget_remaining="$BR" recent_improvements="$(cat "$WD/improvements.json")" k="{{k}}" epsilon="{{epsilon}}" last_decision="$DEC" target_retried="$TR" champion_is_baseline="$CIB" --output json ${B:+--bundle "$B"} > "$WD/_g.txt" 2>/dev/null || true
              python3 "$WD/dlx.py" extract "$WD/_g.txt" > "$WD/gate.json"
              python3 "$WD/dlx.py" gateout "$WD" "$BR"
            output: gate_out
            parse_json: true
        update_context:
          loop_action: "{{gate_out.action}}"
          prev_action: "{{gate_out.action}}"
          prior_lint_reasons: "{{gate_out.prior_lint_reasons}}"
        break_when: "{{loop_action}} == 'DONE' or {{loop_action}} == 'ESCALATE'"

      # ----- FINALIZE: report on the best artifact ever seen + escalation verdict -----
      - id: finalize
        type: bash
        command: |
          set -uo pipefail
          _to(){ if command -v timeout >/dev/null 2>&1; then timeout "$@"; elif command -v gtimeout >/dev/null 2>&1; then gtimeout "$@"; else shift; "$@"; fi; }
          inv(){ local t=${INVOKE_TIMEOUT:-120}; local n=0; while [ $n -lt 2 ]; do _to "$t" "$@" && return 0; n=$((n+1)); echo "invoke retry $n after timeout/err" >&2; done; _to "$t" "$@"; }
          WD="{{work_dir}}"; B='{{bundle_ref}}'
          inv amplifier tool invoke design_ledger op=best task_class="{{task_class}}" --output json ${B:+--bundle "$B"} > "$WD/_best.txt" 2>/dev/null || true
          python3 "$WD/dlx.py" extract "$WD/_best.txt" > "$WD/best_record.json"
          python3 "$WD/dlx.py" verdict "$WD" > "$WD/verdict.json"
          inv amplifier tool invoke render_report verdict="$(cat "$WD/verdict.json")" target_html_path="$WD/best.html" out_path="$WD/report.html" --output json ${B:+--bundle "$B"} > "$WD/_rep.txt" 2>/dev/null || true
          python3 "$WD/dlx.py" extract "$WD/_rep.txt" > "$WD/report.json"
          python3 "$WD/dlx.py" render_two "$WD" "{{loop_action}}" > "$WD/render_two.json" 2>/dev/null || true
          # Output selector: emit whichever artifacts were requested
          OUT_SEL="{{output}}"
          RT_UP=$(python3 "$WD/dlx.py" get "$WD/render_two.json" upgraded_html 2>/dev/null || echo "$WD/best.html")
          RT_RP=$(python3 "$WD/dlx.py" get "$WD/render_two.json" report_html 2>/dev/null || echo "$WD/report.html")
          RT_BL=$(python3 "$WD/dlx.py" get "$WD/render_two.json" baseline_html 2>/dev/null || echo "")
          case "$OUT_SEL" in
            html)
              # upgraded HTML only; report is optional
              echo "output=html: $RT_UP" >&2
              ;;
            report)
              # report only
              echo "output=report: $RT_RP" >&2
              ;;
            prompt)
              # deterministic design-spec text from ledger (no LLM)
              python3 "$WD/dlx.py" designspec "$WD" > "$WD/designspec_out.json" 2>/dev/null || true
              echo "output=prompt: $WD/design-spec.txt" >&2
              ;;
            *)
              # all (default): upgraded HTML + report + design-spec
              python3 "$WD/dlx.py" designspec "$WD" > "$WD/designspec_out.json" 2>/dev/null || true
              ;;
          esac
          python3 "$WD/dlx.py" summary "$WD" "{{loop_action}}"
        output: final_output
        parse_json: true
