# =============================================================================
# design-pass.yaml  —  ONE iteration body of the governed design loop (tier B)
# =============================================================================
# Firewall chain (HARNESS_DESIGN.md §1):
#   Planner (reads ledger) -> Maker (rubric-blind) -> Lints (deterministic gate)
#   -> [judge skipped on hard-fail] -> Critic (blind, 8 scores) -> Controller.evaluate
#   -> Ledger.append. The maker never touches a number; the critic never sees the
#   maker's reasoning. Isolation is enforced by PROMPT MINIMALISM (each agent step
#   is a fresh sub-session seeing only the prompt we hand it) plus each agent
#   bundle's own least-privilege tools/rubric.
#
# DETERMINISM CONTRACT: every control-path decision (lints hard-gate, MACA
# evaluate) is computed by a tool-* invoked from a `type: bash` step via
# `inv amplifier tool invoke ... --output json`. Those steps sample ZERO model tokens.
# Only planner/maker/critic are LLM agents (they are SUPPOSED to think).
#
# HONEST STOPPING: a lint hard-fail seals the pass as `lint_reject` with
# scores=null (never a fabricated zero) and NO judge call is spent.
#
# Structured data flows between steps as FILES under {{pass_dir}} (not as templated
# context dicts) because recipe templating renders dicts as Python repr, not JSON.
# All Python transforms live in a materialised `dlx.py` helper (one base64 blob)
# so the YAML bash steps stay one-liners. See the report's "schema limitations".
# =============================================================================
#
# CHANGELOG
# ---------
# v0.1.0 (2026-06-29):
#   - NEW: inner-pass body for the greedy single-candidate governed loop.
#     Deterministic control path via bash -> `amplifier tool invoke` (zero tokens);
#     lint hard-fail short-circuits the judge (scores stay null — honest stopping);
#     agent isolation via prompt minimalism (no per-step context_depth knob exists).
# =============================================================================

name: "design-pass"
description: "One governed pass: planner -> maker -> lints(gate) -> critic -> MACA evaluate -> ledger. Deterministic control path; honest lint-reject short-circuit."
version: "0.1.0"
author: "design-loop harness"
tags: ["design-loop", "governed-pass", "tier-b"]

context:
  run_id: ""                 # this run's id (parent supplies)
  task_class: "landing_page" # ledger partition key
  signature: "unsigned"      # join key for dead-fix retrieval
  rubric_version: "unknown"  # = design-critic bundle SHA (stamped on every record)
  working_head_path: ""      # ABSOLUTE path to the HTML the maker edits from (= current best)
  best_scores_path: ""       # file holding the 8-dim best scores JSON, or literal null
  pass_dir: ""               # ABSOLUTE scratch dir for THIS pass (files are the data contract)
  bundle_ref: ""             # passed to nested `inv amplifier tool invoke --bundle` (empty = auto-detect)
  tau: "0"                   # MACA regression tolerance
  prior_lint_reasons: ""     # deterministic lint failure reasons
  INVOKE_TIMEOUT: 120      # per-tool-invoke hard timeout in seconds (anti-hang) from previous pass (rubric-free; "" = none)

steps:
  # 1. PLANNER INPUTS — materialise the helper + pull ledger facts (deterministic)
  - id: read-ledger
    type: bash
    command: |
      set -uo pipefail
      _to(){ if command -v timeout >/dev/null 2>&1; then timeout "$@"; elif command -v gtimeout >/dev/null 2>&1; then gtimeout "$@"; else shift; "$@"; fi; }
      inv(){ local t=${INVOKE_TIMEOUT:-120}; local n=0; while [ $n -lt 2 ]; do _to "$t" "$@" && return 0; n=$((n+1)); echo "invoke retry $n after timeout/err" >&2; done; _to "$t" "$@"; }
      W="{{pass_dir}}"; mkdir -p "$W"
      B='{{bundle_ref}}'
      echo '' | base64 -d > "$W/dlx.py"
      inv amplifier tool invoke design_ledger op=query task_class="{{task_class}}" --output json ${B:+--bundle "$B"} > "$W/_q.txt" 2>/dev/null || true
      python3 "$W/dlx.py" extract "$W/_q.txt" > "$W/ledger.json"
      inv amplifier tool invoke design_ledger op=dead_fixes task_class="{{task_class}}" signature="{{signature}}" --output json ${B:+--bundle "$B"} > "$W/_d.txt" 2>/dev/null || true
      python3 "$W/dlx.py" extract "$W/_d.txt" > "$W/dead_fixes.json"
      echo '{"ready":"true"}'
    output: ledger_ready
    parse_json: true

  # 2. PLANNER (LLM) — reads ledger -> highest-leverage, lowest-regression fixes.
  #    SEES: ledger, dead-fixes, scorecard. MAKES nothing; SCORES nothing.
  - id: planner
    type: agent
    agent: "design-loop:design-planner"
    prompt: |
      You are the PLANNER and the anti-collusion firewall. You make no HTML and you
      score nothing. Select the next fix-batch only.

      Read these files:
        - Recent passes (ledger):        {{pass_dir}}/ledger.json
        - Dead strategies (NEVER reuse): {{pass_dir}}/dead_fixes.json
        - Current best scorecard (8 dims, or null): {{best_scores_path}}

      Attack the WORST-scoring dimension. Prefer fixes that lift the worst dim without
      risking regression elsewhere. Skip any strategy_tag listed in dead_fixes.json.

      Emit a JSON array; each element:
        {"fix_id": "...", "target_dims": ["..."], "directive": "...", "strategy_tag": "..."}
      Write the array to {{pass_dir}}/fix_batch.json AND return it as your final message.
    output: fix_batch
    parse_json: true

  # 3. MAKER (LLM, rubric-blind) — applies directives -> real HTML.
  #    SEES: working_head HTML + fix_batch. NEVER SEES: rubric, scores, dim defs.
  - id: maker
    type: agent
    agent: "design-loop:design-maker"
    prompt: |
      You are the MAKER. You optimise the directives you are given, never a score.
      You are NOT shown any scoring rubric, any numbers, or any quality dimensions —
      do not ask for them and do not invent them.
      {{prior_lint_reasons}}

      Read the current design HTML at: {{working_head_path}}
      Apply ONLY the directives in:    {{pass_dir}}/fix_batch.json

      Produce a COMPLETE, SELF-CONTAINED, OFFLINE HTML document (inline all CSS; make
      NO external network requests — an outbound request is a hard lint failure).
      Write the finished document to: {{pass_dir}}/candidate.html and return that path.
    output: maker_done

  # 4. LINTS (deterministic gate, BEFORE the judge). Fail-closed if unreachable.
  - id: lints
    type: bash
    command: |
      set -uo pipefail
      _to(){ if command -v timeout >/dev/null 2>&1; then timeout "$@"; elif command -v gtimeout >/dev/null 2>&1; then gtimeout "$@"; else shift; "$@"; fi; }
      inv(){ local t=${INVOKE_TIMEOUT:-120}; local n=0; while [ $n -lt 2 ]; do _to "$t" "$@" && return 0; n=$((n+1)); echo "invoke retry $n after timeout/err" >&2; done; _to "$t" "$@"; }
      W="{{pass_dir}}"
      B='{{bundle_ref}}'
      inv amplifier tool invoke design_lints html_path="$W/candidate.html" --output json ${B:+--bundle "$B"} > "$W/_l.txt" 2>/dev/null || true
      python3 "$W/dlx.py" extract "$W/_l.txt" > "$W/lints.json"
      python3 "$W/dlx.py" lintflags "$W/lints.json"
    output: lints
    parse_json: true

  # 5. HARD-FAIL PATH — seal as lint_reject (scores=null), NO judge call.
  - id: lint-reject
    type: bash
    condition: "{{lints.hard_fail}} == 'true'"
    command: |
      set -uo pipefail
      _to(){ if command -v timeout >/dev/null 2>&1; then timeout "$@"; elif command -v gtimeout >/dev/null 2>&1; then gtimeout "$@"; else shift; "$@"; fi; }
      inv(){ local t=${INVOKE_TIMEOUT:-120}; local n=0; while [ $n -lt 2 ]; do _to "$t" "$@" && return 0; n=$((n+1)); echo "invoke retry $n after timeout/err" >&2; done; _to "$t" "$@"; }
      W="{{pass_dir}}"
      B='{{bundle_ref}}'
      python3 "$W/dlx.py" lintrec "$W" "{{run_id}}" "{{task_class}}" "{{signature}}" "{{rubric_version}}" > "$W/record.json"
      inv amplifier tool invoke design_ledger op=append record="$(cat "$W/record.json")" --output json ${B:+--bundle "$B"} > "$W/_a.txt" 2>/dev/null || true
      python3 "$W/dlx.py" lintresult "$W" > "$W/result.json"
      cat "$W/result.json"
    output: lint_reject_out
    parse_json: true

  # 6. RENDER (only if lints passed) — stable screenshot at $W/shot.png
  - id: render
    type: bash
    condition: "{{lints.hard_fail}} == 'false'"
    command: |
      set -uo pipefail
      _to(){ if command -v timeout >/dev/null 2>&1; then timeout "$@"; elif command -v gtimeout >/dev/null 2>&1; then gtimeout "$@"; else shift; "$@"; fi; }
      inv(){ local t=${INVOKE_TIMEOUT:-120}; local n=0; while [ $n -lt 2 ]; do _to "$t" "$@" && return 0; n=$((n+1)); echo "invoke retry $n after timeout/err" >&2; done; _to "$t" "$@"; }
      W="{{pass_dir}}"
      B='{{bundle_ref}}'
      inv amplifier tool invoke render source="$W/candidate.html" kind=html out_path="$W/shot.png" --output json ${B:+--bundle "$B"} > "$W/_r.txt" 2>/dev/null || true
      echo '{"rendered":"true"}'
    output: render
    parse_json: true

  # 7. CRITIC (LLM, blind judge) — 8 scores from the RENDER only.
  #    SEES: screenshot + lint facts. NEVER SEES: HTML, maker rationale, directives, prior scores.
  - id: critic
    type: agent
    condition: "{{lints.hard_fail}} == 'false'"
    agent: "design-loop:design-critic"
    prompt: |
      You are the CRITIC — a blind judge. You have NOT seen the source HTML, the maker's
      intent, or any planner directive. Judge only what is on screen.

      View ONLY the rendered screenshot: {{pass_dir}}/shot.png
      Objective lint anchors (context, do not let them override your eyes): {{pass_dir}}/lints.json

      Score these 8 qualities as integers 0-4 against your frozen rubric:
        clarity, elegance, restraint, empowerment, agency, ease, character, point
      Write a single JSON object (the 8 quality names as keys, integer values) to
      {{pass_dir}}/scores.json and return it.
    output: scores
    parse_json: true

  # 8. EVALUATE (deterministic MACA) — accept/reject vs best. NO LLM.
  - id: evaluate
    type: bash
    condition: "{{lints.hard_fail}} == 'false'"
    command: |
      set -uo pipefail
      _to(){ if command -v timeout >/dev/null 2>&1; then timeout "$@"; elif command -v gtimeout >/dev/null 2>&1; then gtimeout "$@"; else shift; "$@"; fi; }
      inv(){ local t=${INVOKE_TIMEOUT:-120}; local n=0; while [ $n -lt 2 ]; do _to "$t" "$@" && return 0; n=$((n+1)); echo "invoke retry $n after timeout/err" >&2; done; _to "$t" "$@"; }
      W="{{pass_dir}}"
      B='{{bundle_ref}}'
      python3 "$W/dlx.py" normscores "$W/scores.json" >/dev/null 2>&1 || true
      python3 "$W/dlx.py" normscores "{{best_scores_path}}" >/dev/null 2>&1 || true
      BS="$(cat "{{best_scores_path}}" 2>/dev/null)"; [ -z "$BS" ] && BS=null
      inv amplifier tool invoke design_controller op=evaluate candidate_scores="$(cat "$W/scores.json")" best_scores="$BS" candidate_hard_fail=false tau="{{tau}}" --output json ${B:+--bundle "$B"} > "$W/_e.txt" 2>/dev/null || true
      python3 "$W/dlx.py" extract "$W/_e.txt" > "$W/decision.json"
      python3 "$W/dlx.py" field "$W/decision.json" decision NO_GAIN
    output: evaluate
    parse_json: true

  # 9. SCORED LEDGER APPEND — map decision -> outcome + reject_reason; persist.
  #    outcome: accepted | regression_reject | judge_below_bar  (§5)
  - id: ledger-scored
    type: bash
    condition: "{{lints.hard_fail}} == 'false'"
    command: |
      set -uo pipefail
      _to(){ if command -v timeout >/dev/null 2>&1; then timeout "$@"; elif command -v gtimeout >/dev/null 2>&1; then gtimeout "$@"; else shift; "$@"; fi; }
      inv(){ local t=${INVOKE_TIMEOUT:-120}; local n=0; while [ $n -lt 2 ]; do _to "$t" "$@" && return 0; n=$((n+1)); echo "invoke retry $n after timeout/err" >&2; done; _to "$t" "$@"; }
      W="{{pass_dir}}"
      B='{{bundle_ref}}'
      DEC="{{evaluate.decision}}"
      case "$DEC" in
        NEW_BEST)   OUTCOME=accepted;          REASON="" ;;
        REGRESSION) OUTCOME=regression_reject; REASON="regression" ;;
        NO_GAIN)    OUTCOME=judge_below_bar;   REASON="no_gain" ;;
        *)          OUTCOME=judge_below_bar;   REASON="$DEC" ;;
      esac
      python3 "$W/dlx.py" passrec "$W" "{{run_id}}" "{{task_class}}" "{{signature}}" "{{rubric_version}}" "$OUTCOME" "$REASON" "$DEC" > "$W/record.json"
      inv amplifier tool invoke design_ledger op=append record="$(cat "$W/record.json")" --output json ${B:+--bundle "$B"} > "$W/_a.txt" 2>/dev/null || true
      if [ "$OUTCOME" = accepted ]; then BREF="$W/candidate.html"; else BREF="prev_best"; fi
      python3 "$W/dlx.py" result "$W" "$DEC" "$BREF" > "$W/result.json"
      cat "$W/result.json"
    output: ledger_scored_out
    parse_json: true

  # 10. ASSEMBLE RETURN — {scores, decision, best_so_far_ref, candidate_html_path}
  #     result.json was written by exactly one of step 5 or step 9.
  - id: assemble
    type: bash
    command: |
      set -uo pipefail
      _to(){ if command -v timeout >/dev/null 2>&1; then timeout "$@"; elif command -v gtimeout >/dev/null 2>&1; then gtimeout "$@"; else shift; "$@"; fi; }
      inv(){ local t=${INVOKE_TIMEOUT:-120}; local n=0; while [ $n -lt 2 ]; do _to "$t" "$@" && return 0; n=$((n+1)); echo "invoke retry $n after timeout/err" >&2; done; _to "$t" "$@"; }
      W="{{pass_dir}}"
      cat "$W/result.json"
    output: final_output
    parse_json: true
