# =============================================================================
# harness-evolution.yaml  —  ASSET 8: the promotion gate (the ratchet -> tier C)
# =============================================================================
# The SLOW CLOCK (HARNESS_DESIGN.md §6/§7): a self-PR loop that turns a recurring,
# expensive Judge catch into a cheap deterministic lint. Across runs, a recurring
# penalty on a `signature` should graduate LEFTWARD:
#
#   subjective judgment -> versioned rubric criterion -> few-shot exemplar -> deterministic lint
#
# In Amplifier the slow clock is a git/PR/CI loop. A promotion is a PULL REQUEST to
# this bundle (new lint predicate + a known-bad/known-good regression fixture pair +
# a rubric-version bump that drops the now-redundant criterion). HUMAN RATIFICATION =
# MERGE. Land on main + bundle-cache refresh -> the next run inherits the check FREE.
#
# WHAT THIS RECIPE DOES (and deliberately does NOT do)
# ----------------------------------------------------
#   MINES  the cross-run ledger for a `signature` the Judge repeatedly penalises.
#   GATES  the top candidate against the five §6 criteria (deterministic parts in
#          bash; the determinism judgment as ONE agent PROPOSE step).
#   DRAFTS a ratifiable promotion proposal (markdown + JSON) — the PR-draft body.
#
# It STOPS SHORT of generating lint code, a regression test, or a rubric bump. That
# is the human-ratified FOLLOW-UP build (the merged PR turns a ratified proposal into
# the actual predicate + test + bump). No codegen is faked here — that would defeat
# the gate the whole asset exists to protect (§6.5: "or it does not ship").
#
# DETERMINISM CONTRACT (same as design-pass / design-converge): every control-path
# decision (recurrence count, the five-criteria gate) is computed by `hev.py` from a
# `type: bash` step; the ledger is read via `amplifier tool invoke ... --output json`
# unwrapped by the SAME repr-extractor as dlx.py. Those steps sample ZERO model
# tokens. Only the single PROPOSE step is an LLM (proposing a measurable predicate IS
# a judgment — exactly criterion §6.2). Structured data flows between steps as FILES
# under {{work_dir}} (recipe templating renders dicts as Python repr, not JSON), so
# all Python transforms live in a materialised `hev.py` (one base64 blob).
#
# SCHEMA LIMITATIONS (honest, see the authoring report)
# -----------------------------------------------------
#  * The §6.4 human ratification is the STAGE-2 APPROVAL GATE. Stage approval gates
#    are STRUCTURAL + UNCONDITIONAL — they fire at the end of the stage regardless of
#    the gate verdict. A gate that pages the human ONLY for `ready_for_ratification`
#    (and silently records `exemplar_only` / `below_recurrence` / `no_candidate`) is
#    NOT expressible. The approval prompt therefore states the verdict and the human
#    approves "record + (if promotable) ratify" or denies. Stage 3 stamps `ratified`
#    only when the verdict is `ready_for_ratification` (emit refuses otherwise).
#  * §6.3 exemplar-PRECISION (predicate fires on NONE of the bar-clearing exemplars)
#    cannot be machine-verified here: it needs the predicate to EXIST as code to run
#    against the exemplar bank, and this recipe does not generate lint code. It is
#    recorded as DEFERRED and the fixture pair is NAMED for the builder to verify.
# =============================================================================
#
# CHANGELOG
# ---------
# v0.1.0 (2026-06-29):
#   - NEW: asset-8 promotion gate. Staged MINE -> GATE(+PROPOSE)+approval -> EMIT.
#     Deterministic mining/gating via bash -> hev.py (zero tokens); one LLM PROPOSE
#     step for the determinism criterion; drafts a ratifiable PR body, stops short of
#     codegen (the human-merged follow-up does that). Honest exemplar_only /
#     below_recurrence / no_candidate stops.
# =============================================================================

name: "harness-evolution"
description: "Asset 8 — the promotion gate. Mines the cross-run ledger for a recurring Judge catch, gates it against the five §6 criteria (deterministic + one PROPOSE step), and drafts a human-ratifiable promotion proposal (lint predicate + regression-fixture pair + rubric bump). Mines/gates/drafts only — stops short of codegen."
version: "0.1.0"
author: "design-loop harness"
tags: ["design-loop", "promotion-gate", "ratchet", "tier-c", "governance", "staged"]

context:
  # --- what to mine ---
  task_class: "landing_page"   # ledger partition key to scan
  min_runs: 3                  # N: recurrence must span >= N DISTINCT run_ids (§6.1)
  low_threshold: 1             # a dim score <= this == "the Judge penalised this quality"

  # --- plumbing (ABSOLUTE paths; no ~ — recipe templating does not expanduser) ---
  work_dir: "/tmp/harness-evolution/r-local"  # scratch + the emitted proposal files
  bundle_ref: ""               # nested `amplifier tool invoke --bundle` (empty = auto-detect)

  # --- ratification stamp (the REAL ratification is the Stage-2 approval gate; reaching
  #     Stage 3 means the human approved, so emit stamps ratified iff the verdict is
  #     promotable). Kept as a context var for auditability. ---
  ratify_decision: "true"

stages:
  # ===========================================================================
  # STAGE 1 — MINE (deterministic): scan the ledger for a recurring Judge catch.
  # ===========================================================================
  - name: mine
    steps:
      # 1. materialise hev.py + pull the cross-run ledger + best-so-far; rank candidates.
      - id: scan-ledger
        type: bash
        command: |
          set -uo pipefail
          W="{{work_dir}}"; mkdir -p "$W"
          B='{{bundle_ref}}'
          echo '' | base64 -d > "$W/hev.py"
          amplifier tool invoke design_ledger op=query task_class="{{task_class}}" --output json ${B:+--bundle "$B"} > "$W/_q.txt" 2>/dev/null || true
          python3 "$W/hev.py" extract "$W/_q.txt" > "$W/records.json"
          amplifier tool invoke design_ledger op=best task_class="{{task_class}}" --output json ${B:+--bundle "$B"} > "$W/_b.txt" 2>/dev/null || true
          python3 "$W/hev.py" extract "$W/_b.txt" > "$W/best_record.json"
          python3 "$W/hev.py" mine "$W/records.json" "{{low_threshold}}" "{{min_runs}}" "$W/candidates.json"
        output: mine
        parse_json: true

      # 2. select the top candidate; bind known-bad (triggering) + known-good (best) refs.
      - id: select-candidate
        type: bash
        command: |
          set -uo pipefail
          W="{{work_dir}}"
          python3 "$W/hev.py" candidate "$W/candidates.json" "$W/best_record.json" "$W/candidate.json"
        output: candidate
        parse_json: true

  # ===========================================================================
  # STAGE 2 — GATE: deterministic five-criteria gate + ONE agent PROPOSE step,
  #           then the HUMAN RATIFICATION approval gate (§6.4 = PR-merge analog).
  # ===========================================================================
  - name: gate
    steps:
      # 3. PROPOSE (the ONLY LLM step) — criterion §6.2: is the recurring catch
      #    expressible as a concrete MEASURABLE predicate? Or is it irreducibly
      #    subjective (-> exemplar only, never a lint)? Skipped if nothing recurred.
      - id: propose-predicate
        type: agent
        condition: "{{candidate.has_candidate}} == 'true'"
        agent: "foundation:zen-architect"
        mode: "ANALYZE"   # a reasoning-class judgment; uses the session's configured provider
        prompt: |
          You are proposing whether a recurring design-quality Judge catch can be
          DEMOTED from subjective judgment to a DETERMINISTIC lint. This is the
          determinism criterion of the promotion gate (HARNESS_DESIGN.md §6.2).

          Read the candidate the harness mined from the cross-run ledger:
            {{work_dir}}/candidate.json

          It contains: the `signature` (the join key for the recurring catch), the
          `penalised_dim` (the quality the Judge keeps scoring low), and
          `worst_examples` (the triggering records, each with its 8-dim scores).

          Decide ONE of:
          (a) DETERMINISTIC — the catch can be expressed as a concrete, measurable
              predicate over an artifact/render that a Playwright-style lint
              (`tool-design-lints`) could compute, with a numeric threshold. Examples:
              "primary CTA foreground/background contrast ratio < 4.5 (WCAG AA)";
              "primary CTA not reachable in keyboard tab order (focus_reachable=false)";
              "viewport overflow on first paint". The predicate must be objective and
              un-gameable — NOT a restatement of the subjective quality.
          (b) NOT-DETERMINISTIC — the catch is irreducibly a matter of taste
              (e.g. "character", "point") and cannot be reduced to a measurable
              predicate. It may only graduate to a few-shot EXEMPLAR, never a lint.

          Write a SINGLE JSON object to {{work_dir}}/proposal.json and return it:
            For (a):
              {"deterministic": true,
               "predicate": "<one measurable sentence>",
               "threshold": "<concrete numeric/boolean threshold>",
               "measurement": "<how a lint would measure it, ideally naming an existing
                                tool-design-lints field>",
               "rubric_criterion_to_retire": "<the rubric criterion this lint makes redundant>",
               "rubric_version_bump": "<e.g. 'minor: drop <criterion> from <dim> rubric'>"}
            For (b):
              {"deterministic": false,
               "rationale": "<why this stays a judgment / exemplar>"}

          Do NOT write any lint code, test, or rubric file — only this proposal JSON.
          Be honest: a false 'deterministic' that a lint cannot actually compute is
          worse than an honest 'not-deterministic'.
        output: proposal
        parse_json: true

      # 4. ASSEMBLE the gate (deterministic): apply the five §6 criteria over the
      #    candidate + the PROPOSE output. Writes gate.json AND a DRAFT proposal
      #    (ratified=false) the human can open on disk during the approval gate.
      #    Reads proposal.json from disk (NOT a template var) so a skipped PROPOSE
      #    step degrades cleanly to "not-deterministic" -> exemplar_only.
      - id: assemble-gate
        type: bash
        command: |
          set -uo pipefail
          W="{{work_dir}}"
          [ -f "$W/proposal.json" ] || echo '{"deterministic": false, "rationale": "no candidate / PROPOSE step skipped"}' > "$W/proposal.json"
          python3 "$W/hev.py" gate "$W/candidate.json" "$W/proposal.json" "{{min_runs}}" "$W/gate.json" > "$W/gate_summary.json"
          python3 "$W/hev.py" emit "$W/gate.json" "$W" false > /dev/null
          cat "$W/gate_summary.json"
        output: gate
        parse_json: true
    approval:
      required: true
      prompt: |
        RATIFY A HARNESS MUTATION (the slow clock — HARNESS_DESIGN.md §6/§7).

        This is the rare, permanent, high-stakes checkpoint: every promotion alters
        what the harness ACCEPTS forever. Same min-not-mean discipline as the loop.

          task_class      : {{task_class}}
          signature       : {{candidate.signature}}
          penalised dim   : {{candidate.penalised_dim}}
          recurrence      : {{candidate.recurrence_runs}} distinct runs (need >= {{min_runs}})
          GATE VERDICT    : {{gate.status}}

        Full PR-draft proposal (open it before deciding):
          {{work_dir}}/promotion-proposal.md
          {{work_dir}}/promotion-proposal.json

        Verdict meanings:
          ready_for_ratification — criteria 1,2,5 hold deterministically; exemplar-
            precision (3) is DEFERRED to the builder (needs the predicate as code).
            APPROVE = ratify this promotion (a follow-up build lands the lint +
            regression test + rubric bump as a PR). DENY = discard.
          exemplar_only — the catch is not expressible as a measurable predicate
            (§6.2 fails); it can only become a few-shot exemplar, NOT a lint.
            APPROVE merely RECORDS that determination; nothing is promoted.
          below_recurrence / no_candidate — nothing graduated. APPROVE to record.

        APPROVE to record the determination (and ratify it iff the verdict is
        ready_for_ratification). DENY to abort and emit nothing.
      timeout: 0
      default: "deny"

  # ===========================================================================
  # STAGE 3 — EMIT: write the (ratified) promotion proposal — the PR-draft body.
  # ===========================================================================
  - name: emit
    steps:
      # 5. EMIT — stamp ratified (iff promotable; emit refuses otherwise) and write
      #    the final markdown + JSON proposal. Reaching this stage == human approved.
      - id: emit-proposal
        type: bash
        command: |
          set -uo pipefail
          W="{{work_dir}}"
          python3 "$W/hev.py" emit "$W/gate.json" "$W" "{{ratify_decision}}"
        output: final_output
        parse_json: true
