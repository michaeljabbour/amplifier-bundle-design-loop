<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synergize</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #7b2ff7 0%, #2a6cf6 100%);
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .hero {
      padding: 40px;
    }

    h1 {
      font-size: 56px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(90deg, #7b2ff7, #2a6cf6);
      color: #ffffff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      border-radius: 999px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Synergize Your Workflow</h1>
    <p>The all-in-one platform that leverages AI to unlock your potential.</p>
    <a href="#" class="btn">Get Started Now</a>
  </div>
</body>
</html>
