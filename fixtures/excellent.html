<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Field Notes</title>
  <style>
    :root {
      --ink: #1f1d1a;
      --muted: #6b665e;
      --paper: #faf8f4;
      --accent: #8a5a2b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, Times, serif;
      line-height: 1.55;
      background-color: var(--paper);
      color: var(--ink);
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 96px 24px;
    }

    .eyebrow {
      font-family: Verdana, sans-serif;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--accent);
      margin-bottom: 24px;
    }

    h1 {
      font-size: 44px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 28px;
      line-height: 1.2;
    }

    p {
      font-size: 17px;
      color: var(--muted);
      margin-bottom: 18px;
    }

    a.cta {
      display: inline-block;
      font-family: Georgia, Times, serif;
      font-size: 16px;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
      margin-top: 12px;
    }

    a.cta:hover {
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">Field Notes</p>
    <h1>A quiet place to keep what you notice.</h1>
    <p>Some things are worth writing down — not to share, not to publish, but simply to hold. Field Notes is a space for those things.</p>
    <p>No algorithms, no feeds, no metrics. Just you and the page, the way it used to be.</p>
    <a href="#" class="cta">Start a notebook →</a>
  </div>
</body>
</html>
